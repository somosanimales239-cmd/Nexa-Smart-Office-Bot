name: Nexa Windows Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  NEXA_BUILD_ONCE_GATE_V1: enabled

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate source
        run: npm run validate
      - name: Nexa approved contract gate
        run: npm run validate:nexa-contract
      - name: Integration tests through package script
        run: npm test
      - name: Contract-declared integration command
        run: node scripts/integration-tests.js
      - name: Implementation tests
        run: npm run test:implementation
      - name: Acceptance tests
        run: npm run test:acceptance
      - name: Electron UI smoke
        run: npm run ui:smoke
      - name: Build Installer Portable and ZIP
        run: npm run build:win
      - name: Verify artifacts
        run: npm run verify:artifacts
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nexa-Smart-Office-Bot-Windows
          path: |
            dist/*.exe
            dist/*.zip
            dist/ARTIFACTS.json
          if-no-files-found: error
          retention-days: 30

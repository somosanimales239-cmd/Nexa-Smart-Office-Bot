name: Build Nexa Smart Office Bot

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        shell: pwsh
        run: npm ci --no-audit --no-fund

      - name: Validate source contracts
        run: npm run validate

      - name: Run integration tests
        run: npm test

      - name: Run Electron UI smoke
        run: npm run ui:smoke

      - name: Build Installer, Portable and ZIP
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:win

      - name: Verify artifact names and sizes
        run: npm run verify:artifacts

      - name: Verify packaged ZIP runtime
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter *.zip | Select-Object -First 1
          if (-not $zip) { throw 'Windows ZIP was not generated.' }
          $extract = Join-Path $env:RUNNER_TEMP 'nexa-zip-check'
          Expand-Archive -Path $zip.FullName -DestinationPath $extract -Force
          $asar = Get-ChildItem $extract -Recurse -Filter app.asar | Select-Object -First 1
          if (-not $asar) { throw 'resources/app.asar is missing from the Windows ZIP.' }
          $exe = Get-ChildItem $extract -Recurse -Filter *.exe | Where-Object { $_.Name -notmatch 'Uninstall' } | Select-Object -First 1
          if (-not $exe) { throw 'Application executable is missing from the Windows ZIP.' }
          Write-Host "Verified app.asar: $($asar.FullName)"
          Write-Host "Verified executable: $($exe.FullName)"

      - name: Upload verified Windows deliverables
        uses: actions/upload-artifact@v4
        with:
          name: Nexa-Smart-Office-Bot-v1.0.0-Windows
          path: |
            dist/*Setup*.exe
            dist/*Portable*.exe
            dist/*.zip
            dist/artifact-manifest.json
          if-no-files-found: error
          retention-days: 30
